<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hack Bot – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      color: #e0e6f0;
      font-family: 'Courier New', monospace;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 700px;
      width: 100%;
    }
    h1 {
      color: #fbbf24;
      font-size: 24px;
      margin-bottom: 4px;
    }
    .sub {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .card {
      background: #1a202a;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .card h3 {
      color: #fbbf24;
      font-size: 14px;
      margin-bottom: 8px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2a2f3a;
      background: #0b0e14;
      color: #e0e6f0;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 10px;
    }
    input:focus, textarea:focus {
      border-color: #fbbf24;
      outline: none;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #fbbf24;
      color: #0b0e14;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .btn:hover { background: #f59e0b; }
    .btn-danger { background: #b31b1b; color: #fff; }
    .btn-danger:hover { background: #8a1515; }
    .data-entry {
      background: #0b0e14;
      border: 1px solid #2a2f3a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 6px;
    }
    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #8a9bb0;
    }
    .stats span { color: #fbbf24; font-weight: 600; }
    .flex { display: flex; flex-wrap: wrap; gap: 6px; }
    .mt-10 { margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">

  <h1>⚡ Hack Bot</h1>
  <div class="sub">Offline — No Telegram, No External Dependencies</div>

  <!-- CAPTURE FORM -->
  <div class="card">
    <h3>📥 Capture Data</h3>
    <input type="text" id="entryKey" placeholder="Label (e.g. Email, Password, SSN)" />
    <input type="text" id="entryValue" placeholder="Value (e.g. victim@email.com)" />
    <div class="flex">
      <button class="btn" onclick="captureData()">+ Capture</button>
      <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
    </div>
  </div>

  <!-- STORED DATA -->
  <div class="card">
    <h3>📦 Stored Data</h3>
    <div class="stats">
      <span id="entryCount">0</span> entries
    </div>
    <div id="dataDisplay" class="data-entry">No data captured yet.</div>
    <div class="flex mt-10">
      <button class="btn" onclick="exportJSON()">⬇️ Export JSON</button>
      <button class="btn" onclick="copyData()">📋 Copy</button>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // HACK BOT – OFFLINE
  // Stores data in localStorage — no external services
  // ============================================================

  const STORAGE_KEY = 'hackbot_data';

  // ---- LOAD DATA ----
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  // ---- SAVE DATA ----
  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ---- RENDER DISPLAY ----
  function render() {
    const data = loadData();
    const display = document.getElementById('dataDisplay');
    const count = document.getElementById('entryCount');

    count.textContent = data.length;

    if (data.length === 0) {
      display.textContent = 'No data captured yet.';
      return;
    }

    // Format as readable list
    let text = '';
    data.forEach((entry, i) => {
      text += `[${i + 1}] ${entry.key}: ${entry.value}\n`;
    });
    display.textContent = text;
  }

  // ---- CAPTURE ----
  function captureData() {
    const keyInput = document.getElementById('entryKey');
    const valueInput = document.getElementById('entryValue');

    const key = keyInput.value.trim();
    const value = valueInput.value.trim();

    if (!key || !value) {
      alert('Please enter both a label and a value.');
      return;
    }

    const data = loadData();
    data.push({ key, value, timestamp: new Date().toISOString() });
    saveData(data);

    keyInput.value = '';
    valueInput.value = '';

    render();
  }

  // ---- CLEAR ALL ----
  function clearAll() {
    if (!confirm('Delete all stored data?')) return;
    saveData([]);
    render();
  }

  // ---- EXPORT JSON ----
  function exportJSON() {
    const data = loadData();
    if (data.length === 0) {
      alert('No data to export.');
      return;
    }
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hackbot_data_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ---- COPY TO CLIPBOARD ----
  function copyData() {
    const data = loadData();
    if (data.length === 0) {
      alert('No data to copy.');
      return;
    }
    let text = '';
    data.forEach((entry, i) => {
      text += `[${i + 1}] ${entry.key}: ${entry.value}\n`;
    });
    navigator.clipboard.writeText(text).then(() => {
      alert('✅ Copied to clipboard!');
    }).catch(() => {
      alert('❌ Failed to copy. Try selecting the text manually.');
    });
  }

  // ---- KEYBOARD SHORTCUT ----
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const active = document.activeElement;
      if (active && (active.id === 'entryKey' || active.id === 'entryValue')) {
        captureData();
      }
    }
  });

  // ---- INIT ----
  render();
</script>

</body>
</html>
